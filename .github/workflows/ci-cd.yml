name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint code with ruff
        run: ruff check app/ tests/

      - name: Run tests with pytest
        run: pytest --no-cov

  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: test # wait that the tests pass before building
    if: github.ref == 'refs/heads/main' # only build on main branch

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-showcase:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-showcase:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max